info:
  name: ping
  type: http
  seq: 1

http:
  method: get
  url: https://script.google.com/macros/s/{{deploymentId}}/exec?action=ping
  params:
    - name: action
      value: ping
      type: query
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.ok
      operator: isTruthy
    - expression: res.body.app
      operator: isDefined
    - expression: res.body.version
      operator: isDefined
    - expression: res.body.initialized
      operator: isDefined

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
