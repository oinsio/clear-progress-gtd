info:
  name: push settings
  type: http
  seq: 6

http:
  method: post
  url: https://script.google.com/macros/s/{{deploymentId}}/exec#push
  headers:
    - name: accept
      value: application/json
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "action": "push",
        "changes": {
          "tasks": [],
          "goals": [],
          "contexts": [],
          "categories": [],
          "checklist_items": [],
          "settings": [
            {
              "key": "default_box",
              "value": "inbox",
              "updated_at": "{{$isoTimestamp}}"
            },
            {
              "key": "accent_color",
              "value": "green",
              "updated_at": "{{$isoTimestamp}}"
            }
          ]
        }
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.ok
      operator: isTruthy
    - expression: res.body.results
      operator: isDefined
    - expression: res.body.results.settings[0].id
      operator: isDefined
    - expression: res.body.results.settings[0].status
      operator: eq
      value: accepted
    - expression: res.body.results.settings[1].id
      operator: isDefined
    - expression: res.body.results.settings[1].status
      operator: eq
      value: accepted
    - expression: res.body.server_time
      operator: isDefined

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
