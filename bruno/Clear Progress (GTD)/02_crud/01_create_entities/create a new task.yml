info:
  name: create a new task
  type: http
  seq: 4

http:
  method: post
  url: https://script.google.com/macros/s/{{deploymentId}}/exec#push
  headers:
    - name: accept
      value: application/json
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "action": "push",
        "changes": {
          "tasks": [
            {
              "id": "{{$randomUUID}}",
              "title": "Schedule a doctor's appointment {{$randomCity}}",
              "notes": "Annual check-up with the GP",
              "box": "week",
              "goal_id": "{{goalId}}",
              "context_id": "{{contextId}}",
              "category_id": "{{categoryId}}",
              "is_completed": false,
              "completed_at": "",
              "repeat_rule": "",
              "sort_order": 4000,
              "is_deleted": false,
              "created_at": "{{$isoTimestamp}}",
              "updated_at": "{{$isoTimestamp}}",
              "version": 1
            }
          ],
          "goals": [],
          "contexts": [],
          "categories": [],
          "checklist_items": [],
          "settings": []
        }
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: bru.setEnvVar("taskId", res.body.results.tasks[0].id);
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.ok
      operator: isTruthy
    - expression: res.body.results
      operator: isDefined
    - expression: res.body.results.tasks[0].id
      operator: isDefined
    - expression: res.body.results.tasks[0].status
      operator: eq
      value: created
    - expression: res.body.results.tasks[0].version
      operator: isDefined
    - expression: res.body.server_time
      operator: isDefined

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
