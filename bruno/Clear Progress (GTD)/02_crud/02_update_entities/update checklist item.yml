info:
  name: update checklist item
  type: http
  seq: 5

http:
  method: post
  url: https://script.google.com/macros/s/{{deploymentId}}/exec#push
  headers:
    - name: accept
      value: application/json
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "action": "push",
        "changes": {
          "tasks": [],
          "goals": [],
          "contexts": [],
          "categories": [],
          "checklist_items": [
            {
              "id": "{{checklistItemsId}}",
              "task_id": "{{taskId}}",
              "title": "Updated: Book the appointment online",
              "is_completed": true,
              "sort_order": 1000,
              "is_deleted": false,
              "created_at": "{{$isoTimestamp}}",
              "updated_at": "{{$isoTimestamp}}",
              "version": 2
            }
          ],
          "settings": []
        }
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.ok
      operator: isTruthy
    - expression: res.body.results.checklist_items[0].id
      operator: isDefined
    - expression: res.body.results.checklist_items[0].status
      operator: eq
      value: accepted
    - expression: res.body.results.checklist_items[0].version
      operator: isDefined
    - expression: res.body.server_time
      operator: isDefined

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
