info:
  name: pull with version 0
  type: http
  seq: 3

http:
  method: post
  url: https://script.google.com/macros/s/{{deploymentId}}/exec#pull
  headers:
    - name: accept
      value: application/json
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "action": "pull",
        "versions": {
          "tasks": 0,
          "goals": 0,
          "contexts": 0,
          "categories": 0,
          "checklist_items": 0
        }
      }
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        const tasks = res.getBody().data.tasks;
        const taskId = bru.getEnvVar("pullScen1TaskId");
        const task = tasks?.find(t => t.id === taskId);

        test("task pushed twice should be present in pull", function() {
          expect(task).to.not.be.undefined;
        });

        test("task should reflect the latest update (v2 title)", function() {
          expect(task?.title).to.eq("Pull scenario task v2 — updated title");
        });

        test("task version should be greater than 1", function() {
          expect(task?.version).to.be.greaterThan(1);
        });

        test("task box should be 'today' from second push", function() {
          expect(task?.box).to.eq("today");
        });
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.ok
      operator: isTruthy
    - expression: res.body.data.tasks
      operator: isDefined

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
