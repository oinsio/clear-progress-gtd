info:
  name: push task v1
  type: http
  seq: 1

http:
  method: post
  url: https://script.google.com/macros/s/{{deploymentId}}/exec#push
  headers:
    - name: accept
      value: application/json
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "action": "push",
        "changes": {
          "tasks": [
            {
              "id": "{{$randomUUID}}",
              "title": "Pull scenario task v1 {{$randomCity}}",
              "notes": "Initial version",
              "box": "inbox",
              "goal_id": "",
              "context_id": "",
              "category_id": "",
              "is_completed": false,
              "completed_at": "",
              "repeat_rule": "",
              "sort_order": 1000,
              "is_deleted": false,
              "created_at": "{{$isoTimestamp}}",
              "updated_at": "{{$isoTimestamp}}",
              "version": 1
            }
          ],
          "goals": [],
          "contexts": [],
          "categories": [],
          "checklist_items": [],
          "settings": []
        }
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: bru.setEnvVar("pullScen1TaskId", res.body.results.tasks[0].id);
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.ok
      operator: isTruthy
    - expression: res.body.results.tasks[0].status
      operator: eq
      value: created

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
