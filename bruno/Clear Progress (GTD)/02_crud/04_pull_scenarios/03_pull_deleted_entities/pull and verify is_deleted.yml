info:
  name: pull and verify is_deleted
  type: http
  seq: 3

http:
  method: post
  url: https://script.google.com/macros/s/{{deploymentId}}/exec#pull
  headers:
    - name: accept
      value: application/json
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "action": "pull",
        "versions": {
          "tasks": 0,
          "goals": 0,
          "contexts": 0,
          "categories": 0,
          "checklist_items": 0
        }
      }
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        const tasks = res.getBody().data.tasks;
        const taskId = bru.getEnvVar("pullScen3TaskId");
        const task = tasks?.find(t => t.id === taskId);

        test("soft-deleted task should be present in pull response", function() {
          expect(task).to.not.be.undefined;
        });

        test("soft-deleted task should have is_deleted = true", function() {
          expect(task?.is_deleted).to.be.true;
        });
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.ok
      operator: isTruthy
    - expression: res.body.data.tasks
      operator: isDefined

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
