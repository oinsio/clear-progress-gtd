info:
  name: push multiple entities at once
  type: http
  seq: 1

http:
  method: post
  url: https://script.google.com/macros/s/{{deploymentId}}/exec#push
  headers:
    - name: accept
      value: application/json
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "action": "push",
        "changes": {
          "tasks": [
            {
              "id": "{{$randomUUID}}",
              "title": "Batch task {{$randomCity}}",
              "notes": "",
              "box": "inbox",
              "goal_id": "",
              "context_id": "",
              "category_id": "",
              "is_completed": false,
              "completed_at": "",
              "repeat_rule": "",
              "sort_order": 1000,
              "is_deleted": false,
              "created_at": "{{$isoTimestamp}}",
              "updated_at": "{{$isoTimestamp}}",
              "version": 1
            }
          ],
          "goals": [
            {
              "id": "{{$randomUUID}}",
              "title": "Batch goal {{$randomAbbreviation}}",
              "description": "",
              "cover_file_id": "",
              "status": "not_started",
              "sort_order": 1000,
              "is_deleted": false,
              "created_at": "{{$isoTimestamp}}",
              "updated_at": "{{$isoTimestamp}}",
              "version": 1
            }
          ],
          "contexts": [
            {
              "id": "{{$randomUUID}}",
              "name": "@Batch{{$randomCity}}",
              "sort_order": 1000,
              "is_deleted": false,
              "created_at": "{{$isoTimestamp}}",
              "updated_at": "{{$isoTimestamp}}",
              "version": 1
            }
          ],
          "categories": [],
          "checklist_items": [],
          "settings": []
        }
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        bru.setEnvVar("batchMultiTaskId", res.body.results.tasks[0].id);
        bru.setEnvVar("batchMultiGoalId", res.body.results.goals[0].id);
        bru.setEnvVar("batchMultiContextId", res.body.results.contexts[0].id);
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.ok
      operator: isTruthy
    - expression: res.body.results.tasks[0].status
      operator: eq
      value: created
    - expression: res.body.results.goals[0].status
      operator: eq
      value: created
    - expression: res.body.results.contexts[0].status
      operator: eq
      value: created
    - expression: res.body.server_time
      operator: isDefined

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
