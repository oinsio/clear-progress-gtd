info:
  name: push task and its checklist items
  type: http
  seq: 1

http:
  method: post
  url: https://script.google.com/macros/s/{{deploymentId}}/exec#push
  headers:
    - name: accept
      value: application/json
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "action": "push",
        "changes": {
          "tasks": [
            {
              "id": "{{batchChecklistTaskId}}",
              "title": "Task with checklist {{$randomCity}}",
              "notes": "",
              "box": "today",
              "goal_id": "",
              "context_id": "",
              "category_id": "",
              "is_completed": false,
              "completed_at": "",
              "repeat_rule": "",
              "sort_order": 1000,
              "is_deleted": false,
              "created_at": "{{$isoTimestamp}}",
              "updated_at": "{{$isoTimestamp}}",
              "version": 1
            }
          ],
          "goals": [],
          "contexts": [],
          "categories": [],
          "checklist_items": [
            {
              "id": "{{$randomUUID}}",
              "task_id": "{{batchChecklistTaskId}}",
              "title": "Step 1: {{$randomCatchPhrase}}",
              "is_completed": false,
              "sort_order": 1000,
              "is_deleted": false,
              "created_at": "{{$isoTimestamp}}",
              "updated_at": "{{$isoTimestamp}}",
              "version": 1
            },
            {
              "id": "{{$randomUUID}}",
              "task_id": "{{batchChecklistTaskId}}",
              "title": "Step 2: {{$randomCatchPhrase}}",
              "is_completed": false,
              "sort_order": 2000,
              "is_deleted": false,
              "created_at": "{{$isoTimestamp}}",
              "updated_at": "{{$isoTimestamp}}",
              "version": 1
            }
          ],
          "settings": []
        }
      }
  auth: inherit

runtime:
  variables:
    - name: batchChecklistTaskId
      value: "{{$randomUUID}}"
  scripts:
    - type: after-response
      code: |-
        bru.setEnvVar("batchChecklistTaskId", res.body.results.tasks[0].id);
        bru.setEnvVar("batchChecklistItem1Id", res.body.results.checklist_items[0].id);
        bru.setEnvVar("batchChecklistItem2Id", res.body.results.checklist_items[1].id);
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.ok
      operator: isTruthy
    - expression: res.body.results.tasks[0].status
      operator: eq
      value: created
    - expression: res.body.results.checklist_items[0].status
      operator: eq
      value: created
    - expression: res.body.results.checklist_items[1].status
      operator: eq
      value: created
    - expression: res.body.server_time
      operator: isDefined

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
