info:
  name: push mix of new and updated
  type: http
  seq: 2

http:
  method: post
  url: https://script.google.com/macros/s/{{deploymentId}}/exec#push
  headers:
    - name: accept
      value: application/json
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "action": "push",
        "changes": {
          "tasks": [
            {
              "id": "{{$randomUUID}}",
              "title": "Mix batch: brand new task {{$randomCity}}",
              "notes": "",
              "box": "week",
              "goal_id": "",
              "context_id": "",
              "category_id": "",
              "is_completed": false,
              "completed_at": "",
              "repeat_rule": "",
              "sort_order": 3000,
              "is_deleted": false,
              "created_at": "{{$isoTimestamp}}",
              "updated_at": "{{$isoTimestamp}}",
              "version": 1
            },
            {
              "id": "{{batchMixUpdateTaskId}}",
              "title": "Mix batch: updated title",
              "notes": "Updated in batch",
              "box": "today",
              "goal_id": "",
              "context_id": "",
              "category_id": "",
              "is_completed": false,
              "completed_at": "",
              "repeat_rule": "",
              "sort_order": 1000,
              "is_deleted": false,
              "created_at": "{{$isoTimestamp}}",
              "updated_at": "{{$isoTimestamp}}",
              "version": 2
            },
            {
              "id": "{{batchMixDeleteTaskId}}",
              "title": "Mix setup: task to delete",
              "notes": "",
              "box": "later",
              "goal_id": "",
              "context_id": "",
              "category_id": "",
              "is_completed": false,
              "completed_at": "",
              "repeat_rule": "",
              "sort_order": 2000,
              "is_deleted": true,
              "created_at": "{{$isoTimestamp}}",
              "updated_at": "{{$isoTimestamp}}",
              "version": 2
            }
          ],
          "goals": [],
          "contexts": [],
          "categories": [],
          "checklist_items": [],
          "settings": []
        }
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: bru.setEnvVar("batchMixNewTaskId", res.body.results.tasks[0].id);
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.ok
      operator: isTruthy
    - expression: res.body.results.tasks[0].status
      operator: eq
      value: created
    - expression: res.body.results.tasks[1].status
      operator: eq
      value: accepted
    - expression: res.body.results.tasks[2].status
      operator: eq
      value: accepted
    - expression: res.body.server_time
      operator: isDefined

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
