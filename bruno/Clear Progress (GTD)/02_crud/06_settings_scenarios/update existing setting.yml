info:
  name: update existing setting
  type: http
  seq: 2

http:
  method: post
  url: https://script.google.com/macros/s/{{deploymentId}}/exec#push
  headers:
    - name: accept
      value: application/json
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "action": "push",
        "changes": {
          "tasks": [],
          "goals": [],
          "contexts": [],
          "categories": [],
          "checklist_items": [],
          "settings": [
            {
              "key": "default_box",
              "value": "today",
              "updated_at": "{{$isoTimestamp}}"
            }
          ]
        }
      }
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        const setting = res.getBody().results.settings[0];

        test("updated setting should have the same id as the original", function() {
          expect(setting.id).to.eq(bru.getEnvVar("settingDefaultBoxId"));
        });

        test("updated setting should have status accepted", function() {
          expect(setting.status).to.eq("accepted");
        });
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.ok
      operator: isTruthy
    - expression: res.body.results.settings[0].id
      operator: isDefined
    - expression: res.body.results.settings[0].status
      operator: eq
      value: accepted
    - expression: res.body.server_time
      operator: isDefined

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
