info:
  name: create conflict checklist item
  type: http
  seq: 9

http:
  method: post
  url: https://script.google.com/macros/s/{{deploymentId}}/exec#push
  headers:
    - name: accept
      value: application/json
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "action": "push",
        "changes": {
          "tasks": [],
          "goals": [],
          "contexts": [],
          "categories": [],
          "checklist_items": [
            {
              "id": "{{conflictChecklistItemId}}",
              "task_id": "{{conflictChecklistTaskId}}",
              "title": "Conflict test subtask",
              "is_completed": false,
              "sort_order": 9999,
              "is_deleted": false,
              "created_at": "{{$isoTimestamp}}",
              "updated_at": "{{$isoTimestamp}}",
              "version": 1
            }
          ],
          "settings": []
        }
      }
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: |-
        bru.setVar("conflictChecklistItemId", require("uuid").v4());
        bru.setVar("conflictChecklistTaskId", require("uuid").v4());
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.ok
      operator: isTruthy
    - expression: res.body.results
      operator: isDefined
    - expression: res.body.results.checklist_items[0].id
      operator: isDefined
    - expression: res.body.results.checklist_items[0].status
      operator: eq
      value: created
    - expression: res.body.results.checklist_items[0].version
      operator: isDefined
    - expression: res.body.server_time
      operator: isDefined

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
