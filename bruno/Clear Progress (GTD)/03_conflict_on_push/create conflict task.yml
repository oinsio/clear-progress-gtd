info:
  name: create conflict task
  type: http
  seq: 7

http:
  method: post
  url: https://script.google.com/macros/s/{{deploymentId}}/exec#push
  headers:
    - name: accept
      value: application/json
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "action": "push",
        "changes": {
          "tasks": [
            {
              "id": "{{conflictTaskId}}",
              "title": "Conflict test task",
              "notes": "",
              "box": "inbox",
              "goal_id": "",
              "context_id": "",
              "category_id": "",
              "is_completed": false,
              "completed_at": "",
              "repeat_rule": "",
              "sort_order": 9999,
              "is_deleted": false,
              "created_at": "{{$isoTimestamp}}",
              "updated_at": "{{$isoTimestamp}}",
              "version": 1
            }
          ],
          "goals": [],
          "contexts": [],
          "categories": [],
          "checklist_items": [],
          "settings": []
        }
      }
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: bru.setVar("conflictTaskId", require("uuid").v4());
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.ok
      operator: isTruthy
    - expression: res.body.results
      operator: isDefined
    - expression: res.body.results.tasks[0].id
      operator: isDefined
    - expression: res.body.results.tasks[0].status
      operator: eq
      value: created
    - expression: res.body.results.tasks[0].version
      operator: isDefined
    - expression: res.body.server_time
      operator: isDefined

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
