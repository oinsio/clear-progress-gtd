info:
  name: get uploaded cover
  type: http
  seq: 2

http:
  method: POST
  url: https://script.google.com/macros/s/{{deploymentId}}/exec#get_cover
  body:
    type: json
    data: |-
      {
        "action": "get_cover",
        "file_ids": [
          "{{fileId}}"
        ]
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.ok
      operator: isTruthy
    - expression: res.body.covers
      operator: isArray
    - expression: res.body.covers.length
      operator: eq
      value: "1"
    - expression: res.body.covers[0].file_id
      operator: eq
      value: "{{fileId}}"
    - expression: res.body.covers[0].mime_type
      operator: startsWith
      value: image
    - expression: res.body.covers[0].data
      operator: isNotEmpty

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
