info:
  name: get uploaded cover
  type: http
  seq: 2

http:
  method: GET
  url: "{{coverUrl}}"
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: Number(res.headers['content-length'])
      operator: gt
      value: "0"
    - expression: res.headers['content-type']
      operator: contains
      value: image

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
