info:
  name: update goal with cover
  type: http
  seq: 3

http:
  method: post
  url: https://script.google.com/macros/s/{{deploymentId}}/exec#push
  headers:
    - name: accept
      value: application/json
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "action": "push",
        "changes": {
          "tasks": [],
          "goals": [
            {
              "id": "{{lifecycleGoalId}}",
              "title": "Goal with Cover {{$randomInt}}",
              "description": "Testing full cover lifecycle",
              "cover_file_id": "{{lifecycleCoverFileId}}",
              "status": "in_progress",
              "sort_order": 1000,
              "is_deleted": false,
              "created_at": "{{$isoTimestamp}}",
              "updated_at": "{{$isoTimestamp}}",
              "version": 2
            }
          ],
          "contexts": [],
          "categories": [],
          "checklist_items": [],
          "settings": []
        }
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: bru.setVar("lifecycleGoalVersion", res.body.results.goals[0].version);
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.ok
      operator: isTruthy
    - expression: res.body.results.goals[0].id
      operator: isDefined
    - expression: res.body.results.goals[0].status
      operator: eq
      value: accepted
    - expression: res.body.results.goals[0].version
      operator: isDefined

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
