info:
  name: push goal with cover for ref test
  type: http
  seq: 2

http:
  method: post
  url: https://script.google.com/macros/s/{{deploymentId}}/exec#push
  headers:
    - name: accept
      value: application/json
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "action": "push",
        "changes": {
          "tasks": [],
          "goals": [
            {
              "id": "{{$randomUUID}}",
              "title": "Goal with referenced cover",
              "description": "",
              "cover_file_id": "{{refTestFileId}}",
              "status": "in_progress",
              "sort_order": 9999,
              "is_deleted": false,
              "created_at": "{{$isoTimestamp}}",
              "updated_at": "{{$isoTimestamp}}",
              "version": 1
            }
          ],
          "contexts": [],
          "categories": [],
          "checklist_items": [],
          "settings": []
        }
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.ok
      operator: isTruthy
    - expression: res.body.results.goals[0].status
      operator: eq
      value: created

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
