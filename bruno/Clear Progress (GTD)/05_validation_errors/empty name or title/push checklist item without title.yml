info:
  name: push checklist item without title
  type: http
  seq: 3

http:
  method: post
  url: https://script.google.com/macros/s/{{deploymentId}}/exec#push
  headers:
    - name: accept
      value: application/json
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "action": "push",
        "changes": {
          "tasks": [],
          "goals": [],
          "contexts": [],
          "categories": [],
          "checklist_items": [
            {
              "id": "{{$randomUUID}}",
              "task_id": "{{$randomUUID}}",
              "title": "",
              "is_completed": false,
              "sort_order": 9999,
              "is_deleted": false,
              "created_at": "{{$isoTimestamp}}",
              "updated_at": "{{$isoTimestamp}}",
              "version": 1
            }
          ],
          "settings": []
        }
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.ok
      operator: isDefined
    - expression: res.body.results.checklist_items[0].status
      operator: eq
      value: rejected
    - expression: res.body.results.checklist_items[0].reason
      operator: eq
      value: title or name must not be blank

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  Pushes a checklist item with an empty title.
  Expected behavior: server rejects the record with status rejected and reason message.
