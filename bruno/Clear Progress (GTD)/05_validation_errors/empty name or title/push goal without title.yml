info:
  name: push goal without title
  type: http
  seq: 1

http:
  method: post
  url: https://script.google.com/macros/s/{{deploymentId}}/exec#push
  headers:
    - name: accept
      value: application/json
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "action": "push",
        "changes": {
          "tasks": [],
          "goals": [
            {
              "id": "{{$randomUUID}}",
              "title": "",
              "description": "",
              "cover_file_id": "",
              "status": "not_started",
              "sort_order": 9999,
              "is_deleted": false,
              "created_at": "{{$isoTimestamp}}",
              "updated_at": "{{$isoTimestamp}}",
              "version": 1
            }
          ],
          "contexts": [],
          "categories": [],
          "checklist_items": [],
          "settings": []
        }
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.ok
      operator: isDefined
    - expression: res.body.results.goals[0].status
      operator: eq
      value: rejected
    - expression: res.body.results.goals[0].reason
      operator: eq
      value: title or name must not be blank

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  Pushes a goal with an empty title.
  Expected behavior: server either rejects (ok: false) or accepts (ok: true with status accepted/created).
  This test documents actual server behavior for empty-title goals.
