info:
  name: push task with invalid context_id
  type: http
  seq: 7

http:
  method: post
  url: https://script.google.com/macros/s/{{deploymentId}}/exec#push
  headers:
    - name: accept
      value: application/json
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "action": "push",
        "changes": {
          "tasks": [
            {
              "id": "{{$randomUUID}}",
              "title": "Task with invalid context_id",
              "notes": "",
              "box": "inbox",
              "goal_id": "",
              "context_id": "not-a-uuid",
              "category_id": "",
              "is_completed": false,
              "completed_at": "",
              "repeat_rule": "",
              "sort_order": 9999,
              "is_deleted": false,
              "created_at": "{{$isoTimestamp}}",
              "updated_at": "{{$isoTimestamp}}",
              "version": 1
            }
          ],
          "goals": [],
          "contexts": [],
          "categories": [],
          "checklist_items": [],
          "settings": []
        }
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.ok
      operator: isDefined
    - expression: res.body.results.tasks[0].status
      operator: eq
      value: rejected
    - expression: res.body.results.tasks[0].reason
      operator: eq
      value: foreign key must be empty or a valid UUID v4

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  Pushes a task with a non-empty, non-UUID context_id.
  Optional FK must be either "" or a valid UUID v4.
  Expected behavior: server rejects the record with status rejected and reason message.
