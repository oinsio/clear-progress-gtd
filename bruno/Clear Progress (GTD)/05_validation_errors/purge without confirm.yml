info:
  name: purge without confirm
  type: http
  seq: 6

http:
  method: post
  url: https://script.google.com/macros/s/{{deploymentId}}/exec#purge
  headers:
    - name: accept
      value: application/json
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "action": "purge"
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.ok
      operator: isFalsy
    - expression: res.body.error
      operator: eq
      value: INVALID_PAYLOAD
    - expression: res.body.message
      operator: eq
      value: confirm must be true to purge deleted records

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  purge called without confirm: true.
  Expected: server refuses to purge and returns ok: false with an error message.
