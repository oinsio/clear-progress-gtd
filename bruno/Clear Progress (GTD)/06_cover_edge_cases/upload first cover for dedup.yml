info:
  name: upload first cover for dedup
  type: http
  seq: 1

http:
  method: post
  url: https://script.google.com/macros/s/{{deploymentId}}/exec#upload_cover
  headers:
    - name: accept
      value: application/json
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "action": "upload_cover",
        "goal_id": "{{$randomUUID}}",
        "filename": "dedup-test.jpg",
        "mime_type": "image/jpeg",
        "data": "{{coverEdgeCaseData}}"
      }
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: |-
        // Always use cover_for_edge_cases to guarantee same SHA-256 on both uploads
        const base64Data = bru.getCollectionVar("cover_for_edge_cases");
        bru.setVar("coverEdgeCaseData", base64Data);
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.ok
      operator: isTruthy
    - expression: res.body.file_id
      operator: isDefined
    - expression: res.body.thumbnail_url
      operator: isDefined
    - expression: res.body.reused
      operator: isDefined
  actions:
    - type: set-variable
      phase: after-response
      selector:
        expression: res.body.file_id
        method: jsonq
      variable:
        name: dedupFileId
        scope: runtime

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
