info:
  name: get uploaded cover
  type: http
  seq: 9

http:
  method: GET
  url: "{{coverUrl}}"
  auth: inherit

runtime:
  assertions:
    - expression: Number(res.headers['content-length'])
      operator: gt
      value: "0"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
