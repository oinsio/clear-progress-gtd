info:
  name: incremental pull
  type: http
  seq: 4

http:
  method: post
  url: https://script.google.com/macros/s/{{deploymentId}}/exec#pull
  headers:
    - name: accept
      value: application/json
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "action": "pull",
        "versions": {
          "tasks": 38,
          "goals": 5,
          "contexts": 1,
          "categories": 1,
          "checklist_items": 2
        }
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.ok
      operator: isTruthy
    - expression: res.body.data
      operator: isDefined
    - expression: res.body.data.tasks
      operator: isDefined
    - expression: res.body.data.goals
      operator: isDefined
    - expression: res.body.data.contexts
      operator: isDefined
    - expression: res.body.data.categories
      operator: isDefined
    - expression: res.body.data.checklist_items
      operator: isDefined
    - expression: res.body.settings
      operator: isDefined
    - expression: res.body.server_time
      operator: isDefined

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
