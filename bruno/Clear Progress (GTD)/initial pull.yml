info:
  name: initial pull
  type: http
  seq: 3

http:
  method: post
  url: https://script.google.com/macros/s/{{deploymentId}}/exec#pull
  headers:
    - name: accept
      value: application/json
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "action": "pull",
        "versions": {
          "tasks": 0,
          "goals": 0,
          "contexts": 0,
          "categories": 0,
          "checklist_items": 0
        }
      }
  auth: inherit

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
