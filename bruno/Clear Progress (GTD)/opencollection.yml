opencollection: 1.0.0

info:
  name: Clear Progress (GTD)
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""

request:
  variables:
    - name: cover_1
      value: 
    - name: cover_2
      value: 
    - name: cover_3
      value: 
  scripts:
    - type: before-request
      code: |-
        // Set environment secret
        bru.setVar('deploymentId', bru.getProcessEnv(bru.getEnvVar('ENVIRONMENT_PREFIX') + "DEPLOYMENT_ID"));
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
    presets:
      request:
        type: http
        url: https://script.google.com/macros/s/
