info:
  name: ping
  type: http
  seq: 1

http:
  method: get
  url: https://script.google.com/macros/s/{{deploymentId}}/exec?action=ping
  params:
    - name: action
      value: ping
      type: query
  auth: inherit

runtime:
  assertions:
    - expression: res.body.ok
      operator: isTruthy

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
