info:
  name: purge deleted data
  type: http
  seq: 15

http:
  method: post
  url: https://script.google.com/macros/s/{{deploymentId}}/exec#purge
  headers:
    - name: accept
      value: application/json
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "action": "purge",
        "confirm": {{confirm}}
      }
  auth: inherit

runtime:
  variables:
    - name: confirm
      value: "true"
    - name: confirm
      value: "false"
      disabled: true
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.ok
      operator: isTruthy
    - expression: res.body.purged
      operator: isDefined
    - expression: res.body.purged.tasks
      operator: isDefined
    - expression: res.body.purged.goals
      operator: isDefined
    - expression: res.body.purged.contexts
      operator: isDefined
    - expression: res.body.purged.categories
      operator: isDefined
    - expression: res.body.purged.checklist_items
      operator: isDefined

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
