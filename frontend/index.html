<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#22c55e" />
    <link rel="manifest" href="/manifest.json" />
    <title>Clear Progress</title>
    <script>
      try {
        let accentColor = localStorage.getItem("accent_color");
        let validAccentColors = ["green","orange","purple","yellow","coral","teal","blue","indigo"];
        if (accentColor && validAccentColors.indexOf(accentColor) !== -1) {
          document.documentElement.setAttribute("data-accent", accentColor);
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
